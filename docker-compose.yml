version: '3.8'

# ─────────────────────────────────────────────────────────────
#  Ensaio das Mães — stack local e Railway
#
#  Serviços:
#   evolution-api  → gateway WhatsApp (Baileys)
#   bot            → este projeto Node.js (webhook + IA + PIX)
#
#  Para subir tudo:
#   docker compose up --build
#
#  Acesse depois:
#   Evolution API:  http://localhost:8080
#   Bot (health):   http://localhost:3000/health
# ─────────────────────────────────────────────────────────────

services:

  # ── Evolution API ─────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # URL pública que a Evolution API usa para montar links de QR code etc.
      # Em produção substitua pelo domínio real.
      SERVER_URL: http://localhost:8080

      # Chave de autenticação da API (mesma do .env do bot)
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Webhook global — aponta para o bot na rede interna Docker
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://bot:3000/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "false"

      # Identificação do cliente WhatsApp
      CONFIG_SESSION_PHONE_CLIENT: EnsaioDasMaes
      CONFIG_SESSION_PHONE_NAME: Chrome

      # Banco — desativado (usa arquivo local)
      DATABASE_ENABLED: "false"

      # Limite de QR codes por sessão
      QRCODE_LIMIT: "30"

    volumes:
      - evolution_data:/evolution/instances
    networks:
      - bot-net

  # ── Bot Node.js ───────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ensaio-bot
    restart: unless-stopped
    ports:
      - "3000:3000"

    # Todas as variáveis são lidas do arquivo .env na raiz
    environment:
      PORT: 3000
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      OWNER_PHONE: ${OWNER_PHONE}
      OWNER_PHONE_2: ${OWNER_PHONE_2}
      OPERATOR_PHONE: ${OPERATOR_PHONE}
      MINHA_CHAVE_PIX: ${MINHA_CHAVE_PIX}

    volumes:
      # Persiste as imagens geradas e o arquivo de números usados
      - bot_data:/app/data

    depends_on:
      - evolution-api
    networks:
      - bot-net

# ── Volumes persistentes ───────────────────────────────────
volumes:
  evolution_data:   # sessões e chave da Evolution API
  bot_data:         # imagens geradas + used_numbers.json

# ── Rede interna (os serviços conversam pelo nome do container)
networks:
  bot-net:
    driver: bridge
